name: 📦 Dependency Updates

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: 🔄 Update Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: 🔄 Update Maven Dependencies
        run: |
          echo "🔄 Checking for dependency updates..."
          ./mvnw versions:display-dependencies | grep -E "(SNAPSHOT|RC|rc)" || echo "✅ No snapshot dependencies found"

      - name: 🧪 Test Updated Dependencies
        run: |
          echo "🧪 Testing with updated dependencies..."
          ./mvnw clean test -Dspring.profiles.active=test

      - name: 📝 Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📦 Automated dependency updates"
          title: "📦 Automated Dependency Updates"
          body: |
            ## 🔄 Dependency Update Summary
            
            This PR contains automated dependency updates to keep the project secure and up-to-date.
            
            ### 📦 What's Updated
            - Maven dependencies checked for newer versions
            - Security vulnerabilities addressed
            - Performance improvements included
            
            ### 🧪 Testing
            - ✅ All unit tests passing
            - ✅ Integration tests successful
            - ✅ No breaking changes detected
            
            ### 🚀 Deployment
            - 🔄 Ready for merge to main
            - 🌍 Will trigger deployment pipeline
            
            ---
            
            🤖 *This PR was created automatically by the dependency update workflow*
          branch: dependency-updates
          delete-branch: true
