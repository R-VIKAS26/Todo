name: 🧪 CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '18'

jobs:
  # Code Quality & Security Checks
  code-quality:
    name: 🔍 Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: 🔍 Run SonarQube Analysis
        run: |
          if [ -z "${{ secrets.QODANA_TOKEN }}" ]; then
            echo "🔍 QODANA_TOKEN not configured, skipping SonarQube analysis"
            echo "📝 To enable SonarQube analysis:"
            echo "   1. Go to https://sonarcloud.io/"
            echo "   2. Create an account or sign in"
            echo "   3. Create a new organization or use existing"
            echo "   4. Create a new project with key 'Todo'"
            echo "   5. Generate a token"
            echo "   6. Add QODANA_TOKEN as a GitHub secret"
            echo "   7. Update sonar.organization in workflow if needed"
            echo "🚀 Continuing with other pipeline steps..."
          else
            echo "🔍 Running SonarQube analysis..."
            ./mvnw clean verify sonar:sonar \
              -Dsonar.projectKey=Todo \
              -Dsonar.organization=r-vikas26 \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.login=${{ secrets.QODANA_TOKEN }} || echo "SonarQube analysis failed, but continuing pipeline..."
          fi

  # Unit Tests
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: 🧪 Run Unit Tests
        run: |
          ./mvnw clean test \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.jpa.hibernate.ddl-auto=create-drop

      - name: 📊 Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        continue-on-error: true
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit

      - name: 📤 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # Integration Tests
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: 🔗 Run Integration Tests
        run: |
          ./mvnw clean verify \
            -Dspring.profiles.active=test,integration \
            -Dspring.datasource.url=jdbc:h2:mem:testdb \
            -Dspring.datasource.driverClassName=org.h2.Driver \
            -Dspring.datasource.username=sa \
            -Dspring.datasource.password= \
            -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect \
            -Dspring.jpa.hibernate.ddl-auto=create-drop

      - name: 📊 Integration Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        continue-on-error: true
        with:
          name: Integration Tests
          path: target/failsafe-reports/*.xml
          reporter: java-junit

      - name: 📤 Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/failsafe-reports/

  # Security Scan
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [unit-tests]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Todo'
          path: '.'
          format: 'HTML'
          out: 'dependency-check-report'

      - name: 📤 Upload Security Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: dependency-check-report/

  # Build & Package
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, integration-tests]
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: 🏗️ Build Application
        run: |
          ./mvnw clean package -DskipTests

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-app
          path: target/*.jar

  # Docker Build
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            r-vikas26/todo:latest
            r-vikas26/todo:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

