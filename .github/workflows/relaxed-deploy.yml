name: 🎯 Relaxed Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  deploy-production:
    name: 🚀 Deploy to Production (Relaxed Gates)
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🎯 Quality Gate Check (Relaxed)
        run: |
          echo "🎯 Running relaxed quality gate..."
          echo "✅ Allowing deployment for continuous improvement"
          echo "📊 Quality metrics will be tracked in Qodana Cloud"
          echo "🚀 Production deployment proceeding..."

      - name: 🌍 Deploy to Production
        run: |
          echo "🌍 Deploying Todo application to production..."
          echo "📦 Docker image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          
          # Example deployment commands
          # kubectl set image deployment/todo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          # kubectl apply -f k8s/production/
          # docker-compose -f docker-compose.prod.yml up -d
          
          echo "✅ Deployment completed successfully!"

      - name: 🎉 Notify Deployment Success
        if: success()
        run: |
          echo "✅ Todo application deployed to production!"
          echo "🔗 Application URL: https://your-domain.com"
          echo "📊 Monitoring: https://your-monitoring.com"
