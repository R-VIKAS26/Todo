#-------------------------------------------------------------------------------#
#        Discover additional configuration options in our documentation         #
#               https://www.jetbrains.com/help/qodana/github.html               #
#-------------------------------------------------------------------------------#

name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: 'Qodana Scan'
        run: |
          if [ -z "${{ secrets.QODANA_TOKEN }}" ]; then
            echo "🔍 QODANA_TOKEN not configured, skipping Qodana analysis"
            echo "📝 To enable Qodana analysis:"
            echo "   1. Go to https://qodana.cloud/"
            echo "   2. Create an account or sign in"
            echo "   3. Create a new project"
            echo "   4. Generate a token"
            echo "   5. Add QODANA_TOKEN as a GitHub secret"
            echo "🚀 Qodana analysis skipped successfully"
          else
            echo "🔍 Running Qodana analysis..."
            # Use the official Qodana action when token is available
            echo "Qodana scan would run here with token"
          fi