# DEVELOPMENT PROFILE - Use H2 for local development

# SERVER CONFIGURATION - Use standard port 8080
server.port=8080

# DATABASE CONFIGURATION - H2 for development
spring.datasource.url=jdbc:h2:mem:todo_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA CONFIG - H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# FLYWAY - Disabled for H2 development
spring.flyway.enabled=false

# MAIL CONFIGURATION - Use environment variables for development
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# ENABLE MAIL SENDING FOR DEVELOPMENT (can be overridden by .env)
app.mail.enabled=${APP_MAIL_ENABLED:true}

# H2 Console - Enabled for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LOGGING - More verbose for development
logging.level.com.vikasr.todo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
