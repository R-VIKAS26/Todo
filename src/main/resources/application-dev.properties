# DEVELOPMENT PROFILE - Use H2 for local development

# SERVER CONFIGURATION - Use standard port 8080
server.port=8080

# DATABASE CONFIGURATION - H2 for development
spring.datasource.url=jdbc:h2:mem:todo_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA CONFIG - H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# FLYWAY - Disabled for H2 development
spring.flyway.enabled=false

# MAIL CONFIGURATION - Use mock mail for development
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# DISABLE MAIL SENDING FOR DEVELOPMENT (to avoid email errors)
app.mail.enabled=false

# H2 Console - Enabled for development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# LOGGING - More verbose for development
logging.level.com.vikasr.todo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
