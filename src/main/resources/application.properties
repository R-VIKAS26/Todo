spring.application.name=Todo
spring.threads.virtual.enabled=${SPRING_THREADS_VIRTUAL_ENABLED:true}
# SERVER
server.address=${SERVER_ADDRESS:}
server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:none}
app.todo-base-url=${APP_TODO_BASE_URL:http://localhost:8080}
app.todo-deep-link-pattern=${APP_TODO_DEEP_LINK_PATTERN:http://localhost:4200/todos/%d}
app.todo-overdue-hours=${APP_TODO_OVERDUE_HOURS:24}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.websocket.allowed-origins=${APP_WEBSOCKET_ALLOWED_ORIGINS:${app.cors.allowed-origins}}
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:false}
app.rate-limit.requests-per-window=${APP_RATE_LIMIT_REQUESTS_PER_WINDOW:300}
app.rate-limit.window-seconds=${APP_RATE_LIMIT_WINDOW_SECONDS:60}
app.rate-limit.paths=${APP_RATE_LIMIT_PATHS:/api/v1/}

# MAIL CONFIGURATION
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# DATABASE CONFIGURATION
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/todo}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:todo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:todo}

# JPA CONFIG
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.generate_statistics=false
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
spring.batch.job.enabled=${SPRING_BATCH_JOB_ENABLED:false}
spring.batch.jdbc.initialize-schema=${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:never}

# JWT CONFIGURATION
jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}
jwt.expiration=${JWT_EXPIRATION:86400000}

# PASSWORD RESET CONFIGURATION
app.frontend.url=${APP_FRONTEND_URL:http://localhost:4200}
app.password.reset.expiration.hours=${APP_PASSWORD_RESET_EXPIRATION_HOURS:1}

# H2 Console
spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

spring.config.import=${SPRING_CONFIG_IMPORT:optional:file:.env[.properties],optional:configserver:http://localhost:8080}
springdoc.api-docs.path=${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}
springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
springdoc.swagger-ui.operationsSorter=${SPRINGDOC_SWAGGER_UI_OPERATIONS_SORTER:method}
springdoc.swagger-ui.tagsSorter=${SPRINGDOC_SWAGGER_UI_TAGS_SORTER:alpha}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
management.health.livenessstate.enabled=${MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:true}
management.health.readinessstate.enabled=${MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:true}
management.health.mail.enabled=${MANAGEMENT_HEALTH_MAIL_ENABLED:false}
logging.file.name=${LOGGING_FILE_NAME:}
logging.logback.rollingpolicy.max-file-size=${LOGGING_ROLLING_MAX_FILE_SIZE:10MB}
logging.logback.rollingpolicy.max-history=${LOGGING_ROLLING_MAX_HISTORY:14}
