<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
        }
        .title {
            color: #2b7cff;
        }
        .task {
            font-size: 18px;
            font-weight: bold;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            margin-top: 15px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="title">🔔 Todo Reminder</h2>

    <p>You have a pending task:</p>

    <p class="task">{{title}}</p>

    <p>{{description}}</p>

    <a href="{{appLink}}" style="
  display:inline-block;
  padding:10px 15px;
  background-color:#28a745;
  color:white;
  text-decoration:none;
  border-radius:5px;">
        Open in Todo
    </a>
    <p style="margin-top:12px;">
        Or mark it done directly:
        <a href="{{completeLink}}">Complete from email</a>
    </p>
    <div class="footer">
        This is an automated reminder from Todo App.
    </div>
</div>
</body>
</html>
