<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fdf2f2;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            border-left: 6px solid #dc3545;
        }
        .title {
            color: #dc3545;
        }
        .task {
            font-size: 18px;
            font-weight: bold;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>
<div class="container">
    <h2 class="title">⏰ Todo Overdue</h2>

    <p>This task is overdue and still pending:</p>

    <p class="task">{{title}}</p>

    <p>{{description}}</p>

    <a href="{{appLink}}" style="
  display:inline-block;
  padding:10px 15px;
  background-color:#dc3545;
  color:white;
  text-decoration:none;
  border-radius:5px;">
        Open in Todo
    </a>
    <p style="margin-top:12px;">
        Or mark it done directly:
        <a href="{{completeLink}}">Complete from email</a>
    </p>
    <div class="footer">
        This is an overdue reminder from Todo App.
    </div>
</div>
</body>
</html>
